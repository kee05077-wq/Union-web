<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNION | 회원가입</title>
  <link rel="stylesheet" href="static/css/main.css">
  <link rel="stylesheet" href="static/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="auth-subpage-body">
  <main class="auth-subpage-shell">
    <section class="auth-subpage-card">
      <span class="eyebrow">JOIN UNION</span>
      <h1>회원가입</h1>
      <p class="auth-copy">이름, 생년월일, 아이디, 비밀번호를 입력해 회원가입을 진행합니다.</p>
      <form id="signupForm" class="auth-form">
        <label><span>이름</span><input type="text" id="signupName" placeholder="이름을 입력하세요" required></label>
        <label><span>생년월일</span><input type="date" id="signupBirthDate" required></label>
        <label><span>아이디</span><input type="text" id="signupUsername" placeholder="아이디를 입력하세요" required></label>
        <label><span>비밀번호</span><input type="password" id="signupPassword" placeholder="비밀번호를 입력하세요" required></label>
        <button class="btn-primary auth-full" type="submit">회원가입 완료</button>
      </form>
      <p class="auth-message" id="signupMessage" aria-live="polite"></p>
    </section>
  </main>
  <script src="static/js/signup.js"></script>
</body>
</html>
