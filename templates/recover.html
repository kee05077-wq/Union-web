<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNION | 아이디 / 비밀번호 찾기</title>
  <link rel="stylesheet" href="./static/css/main.css">
  <link rel="stylesheet" href="./static/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="auth-subpage-body">
  <main class="auth-subpage-shell">
    <section class="auth-subpage-grid">
      <div class="auth-subpage-card">
        <span class="eyebrow">FIND ID</span>
        <h1>아이디 찾기</h1>
        <p class="auth-copy">이름과 생년월일로 가입된 아이디를 찾습니다.</p>
        <form id="findIdForm" class="auth-form">
          <label><span>이름</span><input type="text" id="findIdName" placeholder="이름을 입력하세요" required></label>
          <label><span>생년월일</span><input type="date" id="findIdBirthDate" required></label>
          <button class="btn-primary auth-full" type="submit">아이디 찾기</button>
        </form>
      </div>
      <div class="auth-subpage-card">
        <span class="eyebrow">FIND PASSWORD</span>
        <h1>비밀번호 찾기</h1>
        <p class="auth-copy">아이디, 이름, 생년월일이 모두 일치하면 비밀번호를 찾습니다.</p>
        <form id="findPasswordForm" class="auth-form">
          <label><span>아이디</span><input type="text" id="findPasswordUsername" placeholder="아이디를 입력하세요" required></label>
          <label><span>이름</span><input type="text" id="findPasswordName" placeholder="이름을 입력하세요" required></label>
          <label><span>생년월일</span><input type="date" id="findPasswordBirthDate" required></label>
          <button class="btn-primary auth-full" type="submit">비밀번호 찾기</button>
        </form>
      </div>
    </section>
  </main>
  <script src="./static/js/recover.js"></script>
</body>
</html>
