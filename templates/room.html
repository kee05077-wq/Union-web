<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-On | 화상 회의실</title>
    <!-- 경로 변경됨 -->
    <link rel="stylesheet" href="./static/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./static/css/room.css">
    
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body { background-color: #0b0b0c; color: var(--white); height: 100vh; margin: 0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { border-bottom: 1px solid rgba(255,255,255,0.08) !important; padding: 12px 32px !important; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .video-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 24px; background: #000; }
        .videoBgc { width: 100%; height: 100%; position: relative; max-width: 1200px; display: flex; justify-content: center; align-items: center; }
        #myFace { width: 100%; max-height: 100%; object-fit: cover; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .subtitle-overlay { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); padding: 14px 24px; border-radius: 14px; color: var(--teal); font-size: 16px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); z-index: 10; text-align: center; }
        .sidebar { width: 380px; background: var(--navy-2); display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { padding: 20px; font-size: 15px; font-weight: 700; color: var(--white); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 4px; }
        #dynamicTitle { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 400; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: var(--navy); }
        .chat-bubble { padding: 12px 16px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; max-width: 85%; word-break: break-all; }
        .chat-bubble.other { background: rgba(255,255,255,0.06); color: #fff; align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 4px; }
        .chat-bubble.me { background: var(--coral); color: #fff; align-self: flex-end; font-weight: 500; border-top-right-radius: 4px; }
        #chatInputDiv { padding: 16px 20px; background: var(--navy-2); border-top: 1px solid rgba(255,255,255,0.05); }
        #chatForm { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.1); }
        #chatForm:focus-within { border-color: var(--teal); }
        .btn-file { color: rgba(255,255,255,0.5); cursor: pointer; font-size: 20px; padding: 4px; transition: 0.2s; }
        .btn-file:hover { color: var(--teal); }
        #userChat { flex: 1; border: none; background: transparent; color: #fff; resize: none; font-family: inherit; font-size: 14px; outline: none; height: 24px; padding: 0; line-height: 24px; }
        #sendChat { background: var(--teal); color: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #sendChat:hover { background: #229989; }
        .control-bar { height: 90px; background: var(--navy-2); display: flex; justify-content: center; align-items: center; gap: 32px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 20; }
        .control-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; transition: color 0.2s; }
        .control-btn i { font-size: 22px; }
        .control-btn.active { color: var(--teal); }
        .control-btn.off { color: var(--alert); }
        .btn-leave { background: var(--alert); color: white; border: none; padding: 12px 24px; border-radius: 100px; cursor: pointer; font-weight: 700; font-size: 14px; margin-left: 20px; transition: background 0.2s; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <span class="logo-mark"><span></span><span></span></span>
            <span class="logo-text">UNION<small>TEAM ON</small></span>
        </a>
        <div class="nav-right">
            <nav class="nav-links">
                <ul>
                    <li><a href="chatentry.html">화상강의</a></li>
                    <li><a href="/#service-translate">실시간 번역기</a></li>
                    <li><a href="/#service-sign">교육</a></li>
                    <li><a href="/#service-emergency" class="nav-alert"><span class="nav-alert-dot"></span>긴급신고</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="video-area" id="call">
            <div class="videoBgc" id="myView">
                <video id="myFace" autoplay playsinline></video>
                <div class="subtitle-overlay" id="subtitleText">AI 수어 인식 대기 중...</div>
            </div>
        </section>

        <aside class="sidebar" id="rightBar">
            <div class="sidebar-header">
                <div><i class="bi bi-chat-left-text-fill" style="color:var(--teal)"></i> 실시간 채팅</div>
                <div id="dynamicTitle">로딩 중...</div>
            </div>
            <div id="chatBox">
                <div class="chat-bubble other" style="background: transparent; color: var(--slate); text-align: center; font-size: 12px; width: 100%; border: none;">회의실에 입장하셨습니다.</div>
            </div>
            <div id="chatInputDiv">
                <form id="chatForm">
                    <label for="fileUpload" class="btn-file"><i class="bi bi-plus-circle"></i></label>
                    <input type="file" id="fileUpload" style="display:none;">
                    <textarea name="userChat" id="userChat" placeholder="메시지를 입력하세요..." rows="1"></textarea>
                    <button type="submit" id="sendChat"><i class="bi bi-send-fill"></i></button>
                </form>
            </div>
        </aside>
    </main>

    <footer class="control-bar">
        <button class="control-btn active" id="myAudioStat"><i class="bi bi-mic-fill"></i><span>음소거</span></button>
        <button class="control-btn active" id="myVideoStat"><i class="bi bi-camera-video-fill"></i><span>비디오</span></button>
        <button class="control-btn active" id="RC_sign_toggle"><i class="bi bi-stars"></i><span>수어 인식 ON</span></button>
        <button class="btn-leave" onclick="resetPage()">나가기</button>
    </footer>
    <script src="./static/js/room_ui.js"></script>
</body>
</html>
