<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNION | 실시간 번역기</title>
<link rel="stylesheet" href="static/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
    integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA=="
    crossorigin="anonymous"></script>

<style>
  body{background:#0b0b0c;color:var(--white);height:100vh;margin:0;font-family:'Noto Sans KR', sans-serif;overflow:hidden;display:flex;flex-direction:column;}
  header{border-bottom:1px solid rgba(255,255,255,0.08) !important;padding:12px 32px !important;}
  .nav-active{opacity:1 !important;}
  .nav-active::after{width:100% !important;}

  header{flex-shrink:0;}
  .main-container{display:flex;flex:1;overflow:hidden;min-height:0;}

  /* ---- Left: translation stage ---- */
  .stage{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:#000;overflow-y:auto;}
  .stage-status{position:absolute;top:20px;left:24px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);z-index:5;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--slate);}
  .status-dot.online{background:var(--teal);box-shadow:0 0 0 rgba(43,179,160,0.5);animation:nav-pulse 1.8s ease-out infinite;}
  .status-dot.offline{background:var(--alert);}

  .screen-frame{position:relative;width:100%;max-width:680px;aspect-ratio:4/3;background:var(--navy-2);border-radius:20px;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,0.55);}
  #myFace{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:#000;}

  .scan-overlay{position:absolute;inset:16px;border-radius:14px;pointer-events:none;opacity:0;transition:opacity .3s ease;}
  .scan-overlay.active{opacity:1;}
  .scan-corner{position:absolute;width:26px;height:26px;border:3px solid var(--teal);}
  .scan-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
  .scan-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
  .scan-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 8px;}
  .scan-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 8px 0;}
  .scan-label{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);padding:7px 14px;border-radius:100px;font-size:11.5px;font-weight:700;color:#fff;letter-spacing:0.03em;}
  .rec-dot{width:7px;height:7px;border-radius:50%;background:var(--alert);animation:pulse-dot 1.2s ease-in-out infinite;}

  .subtitle-overlay{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:600px;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);padding:14px 22px;border-radius:14px;color:var(--teal);font-size:16px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 25px rgba(0,0,0,0.3);}

  .stage-caption{margin-top:18px;color:rgba(255,255,255,0.5);font-size:13px;text-align:center;max-width:600px;}

  /* ---- Right: chat room ---- */
  .sidebar{width:400px;min-height:0;background:var(--navy-2);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.05);}
  .sidebar-header{padding:20px;font-size:15px;font-weight:700;color:var(--white);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;gap:4px;}
  #dynamicTitle{font-size:12px;color:rgba(255,255,255,0.5);font-weight:400;}
  #chatBox{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:var(--navy);}

  .chat-bubble{padding:12px 16px;border-radius:14px;font-size:13.5px;line-height:1.5;max-width:85%;word-break:break-word;}
  .chat-bubble.other{background:rgba(255,255,255,0.06);color:#fff;align-self:flex-start;border:1px solid rgba(255,255,255,0.1);border-top-left-radius:4px;}
  .chat-bubble.me{background:var(--coral);color:#fff;align-self:flex-end;font-weight:500;border-top-right-radius:4px;}
  .chat-bubble.system{align-self:center;background:transparent;color:var(--slate);font-size:12px;text-align:center;}
  .chat-bubble.sign{background:var(--teal);color:#fff;font-weight:600;}
  .chat-bubble.sign.me{align-self:flex-end;border-top-right-radius:4px;}
  .chat-bubble.sign.other{align-self:flex-start;border-top-left-radius:4px;}
  .sign-tag{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:0.04em;opacity:0.85;margin-bottom:4px;text-transform:uppercase;}
  .bubble-name{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;font-weight:700;}

  #chatInputDiv{padding:16px 20px;background:var(--navy-2);border-top:1px solid rgba(255,255,255,0.05);}
  #chatForm{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.3);border-radius:12px;padding:8px 12px;border:1px solid rgba(255,255,255,0.1);}
  #chatForm:focus-within{border-color:var(--teal);}
  #userChat{flex:1;border:none;background:transparent;color:#fff;resize:none;font-family:inherit;font-size:14px;outline:none;height:24px;padding:0;line-height:24px;}
  #sendChat{background:var(--teal);color:#fff;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:0.2s;}
  #sendChat:hover{background:#229989;}

  /* ---- Bottom controls (own black bar per section) ---- */
  .cam-controls{flex-shrink:0;width:100%;max-width:680px;margin:14px auto 0;background:#08090f;border-radius:14px;display:flex;justify-content:center;align-items:center;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,0.35);}
  .chat-controls{flex-shrink:0;background:#08090f;border-top:1px solid rgba(255,255,255,0.1);display:flex;justify-content:center;align-items:center;padding:14px 20px;}
  .control-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:10px 20px;min-width:108px;color:rgba(255,255,255,0.6);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:500;transition:color 0.2s, background 0.2s, border-color 0.2s;}
  .control-btn i{font-size:20px;}
  .control-btn.active{color:var(--teal);background:rgba(43,179,160,0.12);border-color:rgba(43,179,160,0.35);}
  .control-btn.off{color:var(--alert);background:rgba(226,72,63,0.12);border-color:rgba(226,72,63,0.35);}
  .btn-leave{width:100%;max-width:280px;background:var(--alert);color:white;border:none;padding:12px 26px;border-radius:100px;cursor:pointer;font-weight:700;font-size:14px;transition:background 0.2s;}
  .btn-leave:hover{background:#f0564a;}

  /* ---- Join gate overlay ---- */
  .join-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 15% 0%, var(--navy-2) 0%, var(--navy) 55%);}
  .join-overlay.hidden{display:none;}
  .join-card{background:var(--white);width:420px;max-width:90vw;padding:44px 36px;border-radius:22px;box-shadow:0 30px 60px rgba(18,22,43,0.3);text-align:center;}
  .join-card .eyebrow{justify-content:center;color:var(--teal);}
  .join-card h2{font-family:'Black Han Sans', sans-serif;font-weight:400;font-size:26px;color:var(--navy);margin:8px 0;}
  .join-card p{color:var(--slate);font-size:14px;margin-bottom:24px;line-height:1.6;}
  .input-group{margin-bottom:18px;text-align:left;}
  .input-group label{font-size:13px;color:var(--slate);margin-bottom:8px;display:block;font-weight:700;}
  .input-group input{width:100%;padding:15px;border:1px solid rgba(18,22,43,0.1);background:var(--cream);color:var(--ink);border-radius:12px;box-sizing:border-box;font-size:15px;font-weight:500;}
  .input-group input:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 4px rgba(43,179,160,0.1);}
  .btn-enter{width:100%;padding:16px;background-color:var(--coral);color:var(--white);border:none;border-radius:100px;font-weight:700;font-size:16px;cursor:pointer;margin-top:6px;transition:transform 0.22s ease, background 0.22s ease;}
  .btn-enter:hover{background-color:#ff805f;transform:translateY(-2px);}

  /* ---- Mobile: stack camera above chat instead of side-by-side ---- */
  @media (max-width:820px){
    body{overflow-y:auto;height:auto;min-height:100vh;}
    .main-container{flex-direction:column;overflow:visible;}
    .stage{flex:none;padding:20px 16px;overflow-y:visible;}
    .sidebar{width:auto;border-left:none;border-top:1px solid rgba(255,255,255,0.05);}
    #chatBox{height:260px;}
  }
</style>
</head>
<body data-socket-url="http://localhost:5000">
    <header>
        <a href="/" class="logo">
            <span class="logo-mark"><span></span><span></span></span>
            <span class="logo-text">UNION<small>TEAM ON</small></span>
        </a>
        <div class="nav-right">
            <nav class="nav-links">
                <ul>
                    <li><a href="chatentry.html">화상강의</a></li>
                    <li><a href="translate.html" class="nav-active">실시간 번역기</a></li>
                    <li><a href="education.html">교육</a></li>
                    <li><a href="/#service-emergency" class="nav-alert"><span class="nav-alert-dot"></span>긴급신고</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <section class="stage" id="stage">
            <div class="stage-status">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">서버 연결 중...</span>
            </div>

            <div class="screen-frame">
                <video id="myFace" autoplay playsinline muted></video>
                <div class="scan-overlay" id="scanOverlay">
                    <div class="scan-corner tl"></div>
                    <div class="scan-corner tr"></div>
                    <div class="scan-corner bl"></div>
                    <div class="scan-corner br"></div>
                    <span class="scan-label"><span class="rec-dot"></span>수어 인식 중...</span>
                </div>
                <div class="subtitle-overlay" id="subtitleText">AI 수어 인식 대기 중...</div>
            </div>
            <p class="stage-caption">카메라 앞에서 수어 동작을 하면 AI가 실시간으로 문장을 인식해 오른쪽 채팅창으로 전달합니다.</p>

            <div class="cam-controls">
                <button class="control-btn" id="signToggle"><i class="bi bi-stars"></i><span>수어 인식 시작</span></button>
            </div>
        </section>

        <aside class="sidebar" id="rightBar">
            <div class="sidebar-header">
                <div><i class="bi bi-chat-left-text-fill" style="color:var(--teal)"></i> 실시간 번역 채팅</div>
                <div id="dynamicTitle">입장 대기 중...</div>
            </div>
            <div id="chatBox"></div>
            <div id="chatInputDiv">
                <form id="chatForm">
                    <textarea name="userChat" id="userChat" placeholder="메시지를 입력하세요..." rows="1"></textarea>
                    <button type="submit" id="sendChat"><i class="bi bi-send-fill"></i></button>
                </form>
            </div>
            <div class="chat-controls">
                <button class="btn-leave" id="leaveBtn">나가기</button>
            </div>
        </aside>
    </main>

    <canvas id="captureCanvas" width="400" height="300" hidden></canvas>

    <div class="join-overlay" id="joinOverlay">
        <div class="join-card">
            <span class="eyebrow">TRANSLATE SESSION</span>
            <h2>실시간 번역기 입장</h2>
            <p>대화 상대와 같은 방 번호를 입력하면 수어 번역과 채팅을 함께 나눌 수 있어요.</p>
            <form id="joinForm">
                <div class="input-group">
                    <label>방 번호</label>
                    <input type="text" id="roomNumber" placeholder="예: 1234" required>
                </div>
                <div class="input-group">
                    <label>닉네임</label>
                    <input type="text" id="userNameInput" placeholder="사용할 닉네임을 입력하세요" required>
                </div>
                <button type="submit" class="btn-enter">번역기 입장하기</button>
            </form>
        </div>
    </div>

    <script src="static/js/translate.js"></script>
</body>
</html>
