<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-On | 회의실 입장</title>
    <!-- 경로 변경됨 -->
    <link rel="stylesheet" href="static/css/main.css">
    <link rel="stylesheet" href="static/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    
    <style>
        body { 
            background: radial-gradient(120% 100% at 15% 0%, var(--navy-2) 0%, var(--navy) 55%);
            color: var(--white); 
            height: 100vh; margin: 0; 
            display: flex; flex-direction: column;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }
        
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-card { background-color: var(--white); width: 440px; padding: 48px 40px; border-radius: 22px; box-shadow: 0 30px 60px rgba(18,22,43,0.3); text-align: center; }
        
        #preview-container { position: relative; width: 100%; height: 220px; margin-bottom: 24px; }
        #preview { width: 100%; height: 100%; background-color: var(--navy-2); border-radius: 14px; display: flex; justify-content: center; align-items: center; color: var(--slate); overflow: hidden; font-weight: 500; font-size: 14px; }
        #preview video { width: 100%; height: 100%; object-fit: cover; }
        
        .preview-controls { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 100px; backdrop-filter: blur(4px); }
        .preview-controls button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .preview-controls button.off { background: var(--alert); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; color: var(--slate); margin-bottom: 8px; display: block; font-weight: 700; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid rgba(18,22,43,0.1); background: var(--cream); color: var(--ink); border-radius: 12px; box-sizing: border-box; font-size: 15px; font-weight: 500; }
        .input-group input:focus { outline: none; border-color: var(--teal); background: #fff; box-shadow: 0 0 0 4px rgba(43, 179, 160, 0.1); }
        
        .btn-enter { width: 100%; padding: 16px; background-color: var(--coral); color: var(--white); border: none; border-radius: 100px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 16px; transition: transform 0.22s ease, background 0.22s ease; }
        .btn-enter:hover { background-color: #ff805f; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <span class="logo-mark"><span></span><span></span></span>
            <span class="logo-text">UNION<small>TEAM ON</small></span>
        </a>
        <div class="nav-right">
            <nav class="nav-links">
                <ul>
                    <li><a href="chatentry.html">화상강의</a></li>
                    <li><a href="translate.html">실시간 번역기</a></li>
                    <li><a href="education.html">교육</a></li>
                    <li><a href="#service-emergency" class="nav-alert"><span class="nav-alert-dot"></span>긴급신고</a></li>
                </ul>
            </nav>
            <a href="#" class="btn-auth">로그인 / 회원가입</a>
        </div>
    </header>

    <main class="main-content">
        <div class="login-card">
            <div id="preview-container">
                <div id="preview">카메라 로딩 중...</div>
                <div class="preview-controls">
                    <button type="button" id="btn-audio" onclick="toggleAudio()"><i class="bi bi-mic-fill"></i></button>
                    <button type="button" id="btn-video" onclick="toggleVideo()"><i class="bi bi-camera-video-fill"></i></button>
                </div>
            </div>
            <div class="input-group">
                <label>방 번호</label>
                <input type="text" id="roomNumber" placeholder="입장할 방 번호를 입력하세요">
            </div>
            <div class="input-group">
                <label>닉네임</label>
                <input type="text" id="userName" placeholder="사용할 닉네임을 입력하세요">
            </div>
            <button class="btn-enter" onclick="joinRoom()">화상 회의실 입장하기</button>
        </div>
    </main>

    <!-- 경로 변경됨 -->
    <div class="auth-modal-backdrop auth-hidden" id="authModal">
        <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
            <button class="auth-close" id="closeAuthModal" type="button" aria-label="닫기">×</button>
            <span class="eyebrow">LOGIN ACCESS</span>
            <h2 id="authModalTitle">로그인</h2>
            <p class="auth-copy">가입된 아이디와 비밀번호로 로그인해 주세요.</p>
            <form id="loginForm" class="auth-form">
                <label>
                    <span>아이디</span>
                    <input type="text" id="loginUsername" placeholder="아이디를 입력하세요" required>
                </label>
                <label>
                    <span>비밀번호</span>
                    <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" required>
                </label>
                <button class="btn-primary auth-full" type="submit">로그인</button>
            </form>
            <div class="auth-links">
                <button type="button" class="auth-text-link" id="openRecoverWindow">아이디 찾기 / 비밀번호 찾기</button>
                <button type="button" class="auth-text-link auth-strong" id="openSignupWindow">회원가입</button>
            </div>
            <p class="auth-message" id="loginMessage" aria-live="polite"></p>
        </div>
    </div>
    <script src="static/js/chatentry.js"></script>
    <script src="static/js/auth.js"></script>
</body>
</html>
