<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-On | 화상 회의실</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./static/frontEnd/css/room.css">
    
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body { background-color: #0b0b0c; color: var(--white); height: 100vh; margin: 0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 상단 헤더 (Glassmorphism 적용) */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 32px; background: rgba(18,22,43,0.92); 
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); 
        }
        .header .logo-text { font-family: 'Black Han Sans', sans-serif; font-size: 20px; letter-spacing: 0.02em; color: var(--white); }
        .header .logo-text small { color: var(--teal); font-family: 'Noto Sans KR', sans-serif; font-size: 10px; margin-left: 4px; letter-spacing: 0.1em; }
        #dynamicTitle { font-weight: 500; font-size: 14.5px; color: rgba(252,250,247,0.7); }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* 비디오 영역 */
        .video-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 24px; background: #000; }
        .videoBgc { width: 100%; height: 100%; position: relative; max-width: 1200px; }
        #myFace { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 자막 스타일 (모의 자막 UI 차용) */
        .subtitle-overlay { 
            position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
            padding: 14px 24px; border-radius: 14px; color: var(--white); 
            font-size: 16px; font-weight: 500; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); z-index: 10; text-align: center;
        }

        /* 사이드바 & 채팅 */
        .sidebar { width: 380px; background: var(--navy-2); display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { padding: 20px; font-size: 15px; font-weight: 700; color: var(--white); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: var(--navy); }
        
        /* 랜딩 페이지의 말풍선 디자인 차용 */
        .chat-bubble { padding: 12px 16px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; max-width: 85%; word-break: break-all; }
        .chat-bubble.other { background: rgba(255,255,255,0.06); color: #fff; align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); }
        .chat-bubble.me { background: var(--coral); color: #fff; align-self: flex-end; font-weight: 500; }
        
        #chatInputDiv { padding: 16px 20px; background: var(--navy-2); border-top: 1px solid rgba(255,255,255,0.05); }
        #chatForm { display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); transition: border-color 0.2s; }
        #chatForm:focus-within { border-color: var(--teal); }
        #userChat { width: 100%; border: none; background: transparent; color: #fff; resize: none; font-family: inherit; font-size: 14px; outline: none; height: 50px; padding: 0; }
        #userChat::placeholder { color: rgba(255,255,255,0.3); }
        .chat-submit-wrapper { display: flex; justify-content: flex-end; }
        #sendChat { background: var(--teal); color: #fff; border: none; padding: 8px 16px; border-radius: 100px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.2s; }
        #sendChat:hover { background: #229989; }

        /* 하단 컨트롤 바 */
        .control-bar { height: 90px; background: var(--navy-2); display: flex; justify-content: center; align-items: center; gap: 32px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 20; }
        .control-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; transition: color 0.2s; }
        .control-btn i { font-size: 22px; }
        .control-btn:hover { color: var(--white); }
        .control-btn.active { color: var(--teal); }
        
        .btn-leave { background: var(--alert); color: white; border: none; padding: 12px 24px; border-radius: 100px; cursor: pointer; font-weight: 700; font-size: 14px; margin-left: 20px; transition: background 0.2s; }
        .btn-leave:hover { background: #c23830; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text">UNION<small>TEAM ON</small></div>
        <div id="dynamicTitle">로딩 중...</div>
    </header>

    <main class="main-container">
        <section class="video-area" id="call">
            <div class="videoBgc" id="myView">
                <video id="myFace" autoplay playsinline muted></video>
                <div class="subtitle-overlay" id="subtitleText">AI 수어 인식 대기 중...</div>
            </div>
            <div id="newUserCloneDiv" hidden></div>
        </section>

        <aside class="sidebar" id="rightBar">
            <div class="sidebar-header">
                <i class="bi bi-chat-left-text-fill" style="color:var(--teal)"></i> 실시간 채팅
            </div>
            <div id="chatBox">
                </div>
            <div id="chatInputDiv">
                <form id="chatForm">
                    <textarea name="userChat" id="userChat" placeholder="메시지를 입력하세요..."></textarea>
                    <div class="chat-submit-wrapper">
                        <input type="submit" id="sendChat" value="전송">
                    </div>
                </form>
            </div>
        </aside>
    </main>

    <footer class="control-bar">
        <button class="control-btn" id="myAudioStat"><i class="bi bi-mic-fill"></i><span>음소거</span></button>
        <button class="control-btn" id="myVideoStat"><i class="bi bi-camera-video-fill"></i><span>비디오</span></button>
        <button class="control-btn active" id="RC_sign_toggle" onclick="signToggle()"><i class="bi bi-stars"></i><span>AI 수어 인식</span></button>
        <button class="btn-leave" onclick="resetPage()">나가기</button>
    </footer>

    <script src="./static/frontEnd/js/room.js"></script>
    <script src="./static/frontEnd/js/chats.js"></script>
    <script src="./static/frontEnd/js/tts.js"></script>
    <script src="./static/frontEnd/js/handler.js"></script>

    <script>
        $(document).ready(function() {
            // 1. 방 정보 로드 및 검증
            const roomDataStr = localStorage.getItem('roomData');
            if(!roomDataStr) {
                alert("비정상적인 접근입니다. 로그인 페이지로 이동합니다.");
                window.location.href = 'login.html';
                return;
            }

            const roomData = JSON.parse(roomDataStr);
            $('#dynamicTitle').text(`[방 번호: ${roomData.room}] 실시간 수어 화상 번역 룸 (${roomData.name}님)`);

            // 2. 폼 제출 제어 로직 (기존 유지)
            $('#chatForm').on('submit', function(e) {
                e.preventDefault(); 
            });

            $('#userChat').on('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if ($(this).val().trim() !== '') {
                        $('#chatForm').trigger('submit'); 
                    }
                }
            });
        });

        // 3. 나가기 버튼 작동
        function resetPage() {
            localStorage.removeItem('roomData');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
